<!DOCTYPE html>
<html lang="en">
<head>
  <title>Secure Access | Redirector Pro Enterprise</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #000;
      color: #ddd;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
    }

    /* Ultra-wide screens (2560px and above) */
    @media (min-width: 2560px) {
      body {
        padding: 32px;
      }
    }

    .login-wrapper {
      width: 100%;
      max-width: min(1000px, 90vw);
      height: auto;
      min-height: 600px;
      max-height: min(800px, 80vh);
      background: #0a0a0a;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 
        0 40px 100px rgba(0,0,0,0.9),
        inset 0 0 80px rgba(20,20,20,0.6);
      display: flex;
      position: relative;
      border: 1px solid #111;
      animation: fadeIn 0.6s ease-out;
      aspect-ratio: 16 / 9;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .image-side {
      flex: 1.3;
      background: #000;
      overflow: hidden;
    }

    .image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.88;
      filter: contrast(1.15) brightness(0.92);
    }

    .form-side {
      flex: 1;
      padding: clamp(1.5rem, 5vh, 3rem) clamp(1.5rem, 5vw, 3rem);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(135deg, rgba(15,15,15,0.92), rgba(8,8,8,0.95));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow-y: auto;
    }

    /* Scrollbar styling for form side when content overflows */
    .form-side::-webkit-scrollbar {
      width: 6px;
    }

    .form-side::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }

    .form-side::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
    }

    .form-side::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.3);
    }

    .dots {
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      letter-spacing: 8px;
      opacity: 0.3;
      margin-bottom: clamp(1rem, 3vh, 2rem);
      user-select: none;
      color: #888;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 400;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #e0e0e0, #b0b0b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .subtitle {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: #888;
      margin-bottom: clamp(1.5rem, 4vh, 2.5rem);
      font-weight: 300;
    }

    /* Info Banner */
    .info-banner {
      background: rgba(0, 100, 200, 0.2);
      border-left: 4px solid #3b82f6;
      padding: clamp(0.75rem, 2vh, 1rem);
      border-radius: 12px;
      margin-bottom: clamp(1rem, 3vh, 1.5rem);
      font-size: clamp(0.8rem, 1.5vw, 0.9rem);
      color: #9ac7ff;
      display: none;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .info-banner i {
      margin-right: 0.5rem;
      color: #3b82f6;
    }

    /* Alert Messages */
    .alert {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: clamp(0.75rem, 2vh, 1rem);
      border-radius: 12px;
      margin-bottom: clamp(1rem, 3vh, 1.5rem);
      font-size: clamp(0.8rem, 1.5vw, 0.9rem);
      backdrop-filter: blur(4px);
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border-left: 4px solid #ef4444;
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.2);
      animation: shake 0.5s ease;
    }

    .alert-info {
      background: rgba(59, 130, 246, 0.1);
      border-left: 4px solid #3b82f6;
      color: #9ac7ff;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .alert-icon {
      font-size: 1.25rem;
    }

    .alert-content {
      flex: 1;
    }

    .alert-title {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .alert-message {
      opacity: 0.9;
    }

    .form-group {
      margin-bottom: clamp(1rem, 2.5vh, 1.5rem);
      position: relative;
    }

    label {
      font-size: clamp(0.8rem, 1.5vw, 0.92rem);
      color: #aaa;
      margin-bottom: 0.4rem;
      display: block;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: clamp(1rem, 2vw, 1.1rem);
      transition: color 0.2s;
      z-index: 1;
    }

    input {
      width: 100%;
      padding: clamp(0.8rem, 2vh, 1.1rem) clamp(1rem, 2vw, 1.3rem);
      padding-left: clamp(2.5rem, 4vw, 3.2rem);
      padding-right: clamp(2.5rem, 4vw, 3.2rem);
      background: rgba(20,20,20,0.7);
      border: 1px solid #222;
      border-radius: 12px;
      color: #eee;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      transition: all 0.22s;
      backdrop-filter: blur(4px);
      -webkit-appearance: none;
    }

    input:hover {
      border-color: #333;
    }

    input:focus {
      outline: none;
      border-color: #555;
      background: rgba(30,30,30,0.8);
      box-shadow: 0 0 0 3px rgba(80,80,80,0.2);
    }

    input:focus + .input-icon {
      color: #888;
    }

    input::placeholder {
      color: #444;
      font-size: clamp(0.85rem, 1.8vw, 0.95rem);
    }

    input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Password Visibility Toggle */
    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #666;
      font-size: clamp(1rem, 2vw, 1.2rem);
      cursor: pointer;
      padding: 0.4rem;
      transition: color 0.2s;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .password-toggle:hover {
      color: #aaa;
    }

    .password-toggle:active {
      color: #fff;
    }

    /* Form Options */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: clamp(1.2rem, 3vh, 1.8rem) 0 clamp(1rem, 2.5vh, 1.5rem);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: #888;
      font-size: clamp(0.8rem, 1.5vw, 0.9rem);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #666;
      cursor: pointer;
    }

    .forgot-link {
      color: #888;
      text-decoration: none;
      font-size: clamp(0.8rem, 1.5vw, 0.9rem);
      transition: color 0.2s;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0.25rem 0.5rem;
      -webkit-tap-highlight-color: transparent;
    }

    .forgot-link:hover {
      color: #b0b0b0;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: clamp(0.9rem, 2.5vh, 1.2rem);
      background: linear-gradient(90deg, #5a5a5a 0%, #8c8c8c 50%, #5a5a5a 100%);
      color: white;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 500;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      background-size: 200% 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      -webkit-tap-highlight-color: transparent;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .submit-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .submit-btn:hover {
      background-position: 100% 0;
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(100,100,100,0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .submit-btn:disabled::before {
      display: none;
    }

    /* Loading State */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Rate Limit Warning */
    .rate-limit-warning {
      margin-top: 1rem;
      padding: clamp(0.6rem, 1.5vh, 0.75rem);
      background: rgba(245, 158, 11, 0.1);
      border-radius: 10px;
      text-align: center;
      font-size: clamp(0.75rem, 1.5vw, 0.85rem);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.2);
      display: none;
    }

    .rate-limit-warning i {
      margin-right: 0.5rem;
      color: #f59e0b;
    }

    /* Footer */
    .login-footer {
      margin-top: clamp(1.5rem, 4vh, 2.5rem);
      text-align: center;
    }

    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(0.5rem, 2vw, 1rem);
      margin-bottom: clamp(0.6rem, 1.5vh, 1rem);
      flex-wrap: wrap;
    }

    .badge-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: clamp(0.65rem, 1.2vw, 0.75rem);
      color: #666;
    }

    .badge-item i {
      color: #4ade80;
      font-size: clamp(0.7rem, 1.3vw, 0.8rem);
    }

    .version-info {
      font-size: clamp(0.65rem, 1.2vw, 0.75rem);
      color: #555;
    }

    .version-info span {
      color: #888;
      font-weight: 600;
    }

    /* Attempt Counter */
    .attempt-counter {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(100, 100, 100, 0.2);
      color: #aaa;
      font-weight: 600;
      transition: all 0.2s;
    }

    /* ============================================ */
    /* RESPONSIVE BREAKPOINTS */
    /* ============================================ */

    /* Large Desktop (1200px - 1600px) */
    @media (min-width: 1200px) and (max-width: 1600px) {
      .login-wrapper {
        max-width: 900px;
        min-height: 550px;
      }
    }

    /* Medium Desktop (992px - 1199px) */
    @media (min-width: 992px) and (max-width: 1199px) {
      .login-wrapper {
        max-width: 850px;
        min-height: 500px;
      }
    }

    /* Tablets Landscape (768px - 991px) */
    @media (min-width: 768px) and (max-width: 991px) {
      .login-wrapper {
        aspect-ratio: auto;
        min-height: 450px;
        max-height: none;
      }
      
      .image-side {
        flex: 1.2;
      }
      
      .form-side {
        padding: 2rem;
      }
    }

    /* Tablets Portrait & Large Phones (576px - 767px) */
    @media (max-width: 767px) {
      .login-wrapper {
        flex-direction: column;
        aspect-ratio: auto;
        max-width: 450px;
        min-height: auto;
        max-height: none;
        border-radius: 24px;
      }

      .image-side {
        height: 180px;
        flex: none;
      }

      .form-side {
        padding: 1.8rem;
      }

      .dots {
        margin-bottom: 1.2rem;
      }
      
      h1 {
        font-size: 2rem;
      }
      
      .subtitle {
        margin-bottom: 1.8rem;
      }
    }

    /* Small Phones (375px - 575px) */
    @media (min-width: 375px) and (max-width: 575px) {
      body {
        padding: 12px;
      }
      
      .login-wrapper {
        border-radius: 20px;
      }
      
      .image-side {
        height: 140px;
      }
      
      .form-side {
        padding: 1.5rem;
      }
      
      h1 {
        font-size: 1.8rem;
      }
      
      .form-options {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.8rem;
      }
      
      .security-badge {
        flex-direction: column;
        gap: 0.4rem;
      }
    }

    /* Extra Small Phones (below 375px) */
    @media (max-width: 374px) {
      body {
        padding: 8px;
      }
      
      .login-wrapper {
        border-radius: 16px;
      }
      
      .image-side {
        height: 120px;
      }
      
      .form-side {
        padding: 1.2rem;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .dots {
        font-size: 1.2rem;
        letter-spacing: 4px;
      }
      
      .form-options {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.8rem;
      }
      
      input {
        padding: 0.8rem;
        padding-left: 2.5rem;
        padding-right: 2.5rem;
      }
      
      .input-icon {
        left: 0.8rem;
      }
      
      .password-toggle {
        right: 0.8rem;
      }
      
      .security-badge {
        flex-direction: column;
        gap: 0.3rem;
      }
    }

    /* iPhone SE and similar */
    @media (max-width: 320px) {
      .image-side {
        height: 100px;
      }
      
      .form-side {
        padding: 1rem;
      }
      
      h1 {
        font-size: 1.4rem;
      }
      
      .badge-item {
        font-size: 0.6rem;
      }
    }

    /* Large Phones Landscape */
    @media (orientation: landscape) and (max-height: 500px) {
      .login-wrapper {
        aspect-ratio: auto;
        max-height: 90vh;
        min-height: auto;
      }
      
      .image-side {
        height: auto;
      }
      
      .form-side {
        padding: 1rem 1.5rem;
      }
      
      .dots {
        margin-bottom: 0.5rem;
      }
      
      h1 {
        margin-bottom: 0.2rem;
      }
      
      .subtitle {
        margin-bottom: 1rem;
      }
      
      .form-group {
        margin-bottom: 0.8rem;
      }
      
      .login-footer {
        margin-top: 1rem;
      }
    }

    /* 4K and Ultra-wide screens */
    @media (min-width: 2000px) {
      .login-wrapper {
        max-width: 1200px;
        min-height: 700px;
      }
      
      .form-side {
        padding: 3rem;
      }
      
      h1 {
        font-size: 3.2rem;
      }
      
      .subtitle {
        font-size: 1.3rem;
      }
      
      input {
        padding: 1.3rem;
        padding-left: 3.5rem;
        padding-right: 3.5rem;
        font-size: 1.2rem;
      }
      
      .input-icon {
        font-size: 1.3rem;
        left: 1.2rem;
      }
      
      .password-toggle {
        font-size: 1.3rem;
      }
      
      .submit-btn {
        padding: 1.3rem;
        font-size: 1.2rem;
      }
    }

    /* Touch Device Optimizations */
    @media (hover: none) and (pointer: coarse) {
      input, 
      .submit-btn, 
      .password-toggle,
      .forgot-link,
      .remember-me {
        min-height: 48px;
      }
      
      .remember-me input[type="checkbox"] {
        width: 20px;
        height: 20px;
      }
      
      .password-toggle {
        padding: 12px;
      }
    }

    /* High Contrast Mode */
    @media (prefers-contrast: high) {
      input {
        border-width: 2px;
      }
      
      .alert {
        border-width: 2px;
      }
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      .login-wrapper,
      .submit-btn::before,
      .loading-spinner {
        animation: none;
      }
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
      }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="image-side">
      <img src="https://img.freepik.com/free-photo/3d-rendering-abstract-black-white-background_23-2150914061.jpg" alt="Abstract black chrome background">
    </div>

    <div class="form-side">
      <div class="dots">•••</div>

      <h1>Welcome Back</h1>
      <p class="subtitle">Secure access to your dashboard</p>

      <!-- Info Banner (Shown when URL has parameters) -->
      <div class="info-banner" id="infoBanner">
        <i class="fas fa-info-circle"></i>
        <span id="infoMessage"></span>
      </div>

      <!-- CSRF Token (Will be injected by server) -->
      <input type="hidden" id="csrfToken" value="">

      <!-- Error Alert -->
      <div class="alert alert-error" id="errorAlert" style="display: none;">
        <div class="alert-icon">
          <i class="fas fa-exclamation-circle"></i>
        </div>
        <div class="alert-content">
          <div class="alert-title">Authentication Failed</div>
          <div class="alert-message" id="errorMessage">Invalid username or password</div>
        </div>
      </div>

      <!-- Rate Limit Alert -->
      <div class="alert alert-info" id="rateLimitAlert" style="display: none;">
        <div class="alert-icon">
          <i class="fas fa-clock"></i>
        </div>
        <div class="alert-content">
          <div class="alert-title">Too Many Attempts</div>
          <div class="alert-message" id="rateLimitMessage">Please wait before trying again</div>
        </div>
      </div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input 
              type="text" 
              id="username" 
              name="username" 
              placeholder="Enter your username" 
              value="admin"
              required 
              autofocus
              autocomplete="username"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Enter your password" 
              required
              autocomplete="current-password"
            >
            <button 
              type="button" 
              class="password-toggle" 
              id="togglePassword"
              tabindex="-1"
              aria-label="Toggle password visibility"
            >
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            <span>Remember me</span>
          </label>
          <button type="button" class="forgot-link" onclick="showHelp(event)">Need help?</button>
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">
          <span>Sign In</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <!-- Rate Limit Warning -->
      <div class="rate-limit-warning" id="rateLimitWarning">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="rateLimitWarningMessage"></span>
      </div>

      <!-- Footer -->
      <div class="login-footer">
        <div class="security-badge">
          <div class="badge-item">
            <i class="fas fa-lock"></i>
            <span>256-bit SSL</span>
          </div>
          <div class="badge-item">
            <i class="fas fa-shield"></i>
            <span>CSRF Protected</span>
          </div>
          <div class="badge-item">
            <i class="fas fa-clock"></i>
            <span>Session Timeout</span>
          </div>
        </div>
        <div class="version-info">
          <span>Redirector Pro v3.0</span> • Enterprise Edition • 
          <span class="attempt-counter" id="attemptCounter">5</span> attempts remaining
        </div>
      </div>
    </div>
  </div>

  <script nonce="{{NONCE}}">
    // Configuration
    const MAX_ATTEMPTS = 5;
    const LOCKOUT_TIME = 5 * 60 * 1000; // 5 minutes
    const DEBUG_MODE = true;

    // State
    let loginAttempts = 0;
    let lockoutUntil = null;
    let csrfToken = '';
    let countdownInterval = null;

    // DOM Elements
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    const rateLimitAlert = document.getElementById('rateLimitAlert');
    const rateLimitMessage = document.getElementById('rateLimitMessage');
    const rateLimitWarning = document.getElementById('rateLimitWarning');
    const rateLimitWarningMessage = document.getElementById('rateLimitWarningMessage');
    const attemptCounter = document.getElementById('attemptCounter');
    const togglePassword = document.getElementById('togglePassword');
    const rememberMe = document.getElementById('rememberMe');
    const infoBanner = document.getElementById('infoBanner');
    const infoMessage = document.getElementById('infoMessage');

    // ============================================
    // IMMEDIATE URL CLEANUP
    // ============================================
    (function() {
      console.log('📍 Current URL:', window.location.href);
      
      if (window.location.search) {
        console.log('🧹 Found query parameters, cleaning URL...');
        
        if (infoBanner) {
          infoMessage.textContent = 'Removed login parameters from URL for security';
          infoBanner.style.display = 'flex';
          
          setTimeout(() => {
            infoBanner.style.display = 'none';
          }, 5000);
        }
        
        const cleanUrl = window.location.protocol + '//' + 
                        window.location.host + 
                        window.location.pathname;
        
        window.history.replaceState(null, null, cleanUrl);
        console.log('✅ URL cleaned:', cleanUrl);
      }
      
      if (window.location.hash && window.location.hash.includes('=')) {
        window.history.replaceState(null, null, window.location.pathname);
        console.log('🧹 Cleaned hash from URL');
      }
    })();

    // ============================================
    // Initialize
    // ============================================
    document.addEventListener('DOMContentLoaded', initialize);

    function initialize() {
      const tokenElement = document.getElementById('csrfToken');
      csrfToken = tokenElement ? tokenElement.value : '';
      
      if (!csrfToken) {
        console.error('❌ CSRF token not found in page');
        showError('Security token missing. Please refresh the page.');
        setTimeout(() => window.location.reload(), 2000);
        return;
      }
      
      console.log('✅ CSRF token loaded from page');
      
      loadSavedCredentials();
      startAttemptTimer();
      
      if (window.location.search || window.location.hash) {
        window.history.replaceState(null, null, window.location.pathname);
      }
    }

    // Load saved credentials
    function loadSavedCredentials() {
      try {
        const savedUsername = localStorage.getItem('redirector_username');
        if (savedUsername) {
          usernameInput.value = savedUsername;
          rememberMe.checked = true;
        }
      } catch (err) {
        console.error('Failed to load saved credentials:', err);
      }
    }

    // Start attempt countdown timer
    function startAttemptTimer() {
      updateAttemptDisplay();
      
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }
      
      countdownInterval = setInterval(() => {
        if (lockoutUntil) {
          const now = Date.now();
          if (now > lockoutUntil) {
            lockoutUntil = null;
            loginAttempts = 0;
            rateLimitAlert.style.display = 'none';
            rateLimitWarning.style.display = 'none';
            enableForm();
            updateAttemptDisplay();
          } else {
            updateAttemptDisplay();
          }
        }
      }, 1000);
    }

    // Update attempt display
    function updateAttemptDisplay() {
      if (lockoutUntil) {
        const remaining = Math.max(0, Math.ceil((lockoutUntil - Date.now()) / 1000));
        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        
        attemptCounter.textContent = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;
        attemptCounter.style.background = 'rgba(239, 68, 68, 0.2)';
        attemptCounter.style.color = '#fecaca';
        attemptCounter.style.padding = '2px 8px';
      } else {
        const remaining = MAX_ATTEMPTS - loginAttempts;
        attemptCounter.textContent = remaining;
        attemptCounter.style.color = remaining <= 2 ? '#fbbf24' : '#aaa';
        attemptCounter.style.background = 'rgba(100, 100, 100, 0.2)';
        attemptCounter.style.padding = '2px 8px';
      }
    }

    // Toggle password visibility
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      const icon = togglePassword.querySelector('i');
      icon.className = type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
    });

    // Show error message
    function showError(message) {
      errorMessage.textContent = message;
      errorAlert.style.display = 'flex';
      
      setTimeout(() => {
        errorAlert.style.display = 'none';
      }, 5000);
    }

    // Show rate limit message
    function showRateLimit(message, isLocked = false) {
      if (isLocked) {
        rateLimitMessage.textContent = message;
        rateLimitAlert.style.display = 'flex';
        rateLimitWarning.style.display = 'none';
      } else {
        rateLimitWarningMessage.textContent = message;
        rateLimitWarning.style.display = 'block';
        rateLimitAlert.style.display = 'none';
      }
    }

    // Disable form
    function disableForm(isLocked = false) {
      usernameInput.disabled = true;
      passwordInput.disabled = true;
      loginBtn.disabled = true;
      
      if (isLocked) {
        loginBtn.innerHTML = '<span class="loading-spinner"></span><span>Locked</span>';
      } else {
        loginBtn.innerHTML = '<span class="loading-spinner"></span><span>Verifying...</span>';
      }
    }

    // Enable form
    function enableForm() {
      usernameInput.disabled = false;
      passwordInput.disabled = false;
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<span>Sign In</span><i class="fas fa-arrow-right"></i>';
      passwordInput.focus();
    }

    // Show help dialog
    function showHelp(event) {
      event.preventDefault();
      alert(
        '🔐 Admin Access Help\n\n' +
        '• Default username: admin\n' +
        '• Password was set during installation\n' +
        '• Check your .env file for ADMIN_PASSWORD_HASH\n' +
        '• Contact your system administrator for assistance'
      );
    }

    // Handle form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      
      if (window.location.search) {
        window.history.replaceState(null, null, window.location.pathname);
      }
      
      if (lockoutUntil && Date.now() < lockoutUntil) {
        const remaining = Math.ceil((lockoutUntil - Date.now()) / 1000);
        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        const timeString = minutes > 0 ? `${minutes} minute${minutes > 1 ? 's' : ''}` : `${seconds} second${seconds > 1 ? 's' : ''}`;
        
        showRateLimit(`Too many failed attempts. Please wait ${timeString}.`, true);
        return;
      }
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (!username) {
        showError('Please enter your username');
        usernameInput.focus();
        return;
      }
      
      if (!password) {
        showError('Please enter your password');
        passwordInput.focus();
        return;
      }
      
      if (!csrfToken) {
        showError('Security token missing. Refreshing...');
        setTimeout(() => window.location.reload(), 2000);
        return;
      }
      
      disableForm();
      
      try {
        console.log('📤 Sending login request for user:', username);
        
        const response = await fetch('/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfToken,
            'X-Requested-With': 'XMLHttpRequest',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            username: username,
            password: password,
            _csrf: csrfToken,
            remember: rememberMe.checked
          }),
          credentials: 'include'
        });
        
        let data;
        const contentType = response.headers.get('content-type');
        if (contentType && contentType.includes('application/json')) {
          data = await response.json();
        } else {
          const text = await response.text();
          console.error('❌ Non-JSON response:', text.substring(0, 200));
          throw new Error('Invalid server response format');
        }
        
        if (response.ok && data.success) {
          console.log('✅ Login successful, redirecting...');
          
          try {
            if (rememberMe.checked) {
              localStorage.setItem('redirector_username', username);
            } else {
              localStorage.removeItem('redirector_username');
            }
          } catch (err) {
            console.error('Failed to save username:', err);
          }
          
          window.location.href = '/admin';
        } else {
          loginAttempts++;
          console.log(`❌ Login failed. Attempt ${loginAttempts}/${MAX_ATTEMPTS}`);
          
          updateAttemptDisplay();
          
          if (loginAttempts >= MAX_ATTEMPTS) {
            lockoutUntil = Date.now() + LOCKOUT_TIME;
            showRateLimit(`Account locked for 5 minutes due to too many failed attempts.`, true);
            disableForm(true);
            console.warn(`🔒 Account locked until ${new Date(lockoutUntil).toISOString()}`);
          } else {
            const remaining = MAX_ATTEMPTS - loginAttempts;
            showError(data.error || 'Invalid username or password');
            
            if (remaining <= 2) {
              showRateLimit(`${remaining} attempt${remaining > 1 ? 's' : ''} remaining before lockout`, false);
            }
            
            enableForm();
            
            loginForm.style.animation = 'none';
            loginForm.offsetHeight;
            loginForm.style.animation = 'shake 0.5s ease';
            
            passwordInput.value = '';
          }
        }
      } catch (err) {
        console.error('❌ Login error:', err);
        showError('Connection error. Please check your network and try again.');
        enableForm();
      }
    });

    // Input validation
    usernameInput.addEventListener('input', () => {
      errorAlert.style.display = 'none';
      rateLimitWarning.style.display = 'none';
    });
    
    passwordInput.addEventListener('input', () => {
      errorAlert.style.display = 'none';
      rateLimitWarning.style.display = 'none';
    });
    
    usernameInput.addEventListener('invalid', (e) => {
      e.preventDefault();
      showError('Please enter your username');
    });
    
    passwordInput.addEventListener('invalid', (e) => {
      e.preventDefault();
      showError('Please enter your password');
    });

    // Handle Enter key
    loginForm.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !loginBtn.disabled) {
        e.preventDefault();
        loginForm.dispatchEvent(new Event('submit'));
      }
    });

    // Handle back/forward cache
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) {
        console.log('📱 Page loaded from back/forward cache, reloading...');
        window.location.reload();
      }
    });

    // Prevent form resubmission
    if (window.history.replaceState) {
      window.history.replaceState(null, null, window.location.href);
    }

    // Clean up on unload
    window.addEventListener('beforeunload', () => {
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }
    });

    // Monitor URL for changes
    let lastUrl = location.href;
    new MutationObserver(() => {
      const url = location.href;
      if (url !== lastUrl) {
        lastUrl = url;
        if (location.search || location.hash) {
          console.log('🧹 URL changed, cleaning parameters...');
          const cleanUrl = location.protocol + '//' + 
                          location.host + 
                          location.pathname;
          history.replaceState(null, null, cleanUrl);
        }
      }
    }).observe(document, {subtree: true, childList: true});

    // iOS/Safari fix
    if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
      document.addEventListener('touchstart', () => {
        if (window.location.search) {
          history.replaceState(null, null, window.location.pathname);
        }
      }, { passive: true });
    }

    // Handle orientation change
    window.addEventListener('orientationchange', () => {
      setTimeout(() => {
        // Adjust any layout issues after orientation change
        document.body.style.height = window.innerHeight + 'px';
      }, 100);
    });

    // Handle resize events for mobile keyboard
    window.addEventListener('resize', () => {
      if (window.innerHeight < 500) {
        // Keyboard is likely open on mobile
        document.querySelector('.form-side').style.overflowY = 'auto';
      }
    });
  </script>
</body>
</html>
