<!DOCTYPE html>
<html>
<head>
  <title>Admin Login - Redirector Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-card {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    h1 {
      text-align: center;
      margin-bottom: 2rem;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .form-group {
      margin-bottom: 1rem;
    }
    
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #666;
      font-weight: 500;
    }
    
    .input-group {
      position: relative;
    }
    
    .input-group i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
    }
    
    input {
      width: 100%;
      padding: 0.75rem 0.75rem 0.75rem 2.5rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102,126,234,0.4);
    }
    
    .error {
      background: #fee;
      color: #c00;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
      text-align: center;
    }
    
    .footer {
      text-align: center;
      margin-top: 1.5rem;
      color: #999;
      font-size: 0.9rem;
    }
    
    .version {
      text-align: center;
      margin-top: 0.5rem;
      color: #667eea;
      font-size: 0.8rem;
    }
    
    .loading {
      display: none;
      text-align: center;
      margin-top: 1rem;
    }
    
    .loading i {
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>
      <i class="fas fa-shield-alt" style="color:#667eea"></i>
      Admin Login
    </h1>
    
    <div class="error" id="error">
      <i class="fas fa-exclamation-circle"></i> Invalid credentials
    </div>
    
    <form id="loginForm">
      <input type="hidden" name="_csrf" id="csrfToken">
      
      <div class="form-group">
        <label>Username</label>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Enter username" required autofocus>
        </div>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
      </div>
      
      <button type="submit" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i>
        Login
      </button>
      
      <div class="loading" id="loading">
        <i class="fas fa-spinner"></i> Logging in...
      </div>
    </form>
    
    <div class="footer">Redirector Pro v3.0 Enterprise</div>
    <div class="version">Secure Link Management System</div>
  </div>
  
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      
      // Disable button and show loading
      loginBtn.disabled = true;
      loading.style.display = 'block';
      error.style.display = 'none';
      
      try {
        // First get CSRF token
        const tokenRes = await fetch('/admin/login', {
          method: 'GET',
          credentials: 'include'
        });
        
        // Extract CSRF token from page (simplified - in production, you'd get this from a meta tag)
        const html = await tokenRes.text();
        const match = html.match(/name="_csrf" value="([^"]+)"/);
        const csrfToken = match ? match[1] : '';
        
        document.getElementById('csrfToken').value = csrfToken;
        
        // Now attempt login
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfToken
          },
          body: JSON.stringify({
            username,
            password,
            _csrf: csrfToken
          }),
          credentials: 'include'
        });
        
        if (res.ok) {
          window.location.href = '/admin';
        } else {
          error.style.display = 'block';
          loginBtn.disabled = false;
          loading.style.display = 'none';
        }
      } catch (err) {
        error.style.display = 'block';
        error.innerHTML = '<i class="fas fa-exclamation-circle"></i> Network error';
        loginBtn.disabled = false;
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
