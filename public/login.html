<!DOCTYPE html>
<html lang="en">
<head>
  <title>Secure Access | Redirector Pro Enterprise</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#6366f1">
  <meta name="color-scheme" content="light">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    /* CSS Variables for Theming */
    :root {
      --primary-50: #eef2ff;
      --primary-100: #e0e7ff;
      --primary-200: #c7d2fe;
      --primary-300: #a5b4fc;
      --primary-400: #818cf8;
      --primary-500: #6366f1;
      --primary-600: #4f46e5;
      --primary-700: #4338ca;
      --primary-800: #3730a3;
      --primary-900: #312e81;
      
      --neutral-50: #fafafa;
      --neutral-100: #f4f4f5;
      --neutral-200: #e4e4e7;
      --neutral-300: #d4d4d8;
      --neutral-400: #a1a1aa;
      --neutral-500: #71717a;
      --neutral-600: #52525b;
      --neutral-700: #3f3f46;
      --neutral-800: #27272a;
      --neutral-900: #18181b;
      
      --success-500: #22c55e;
      --error-500: #ef4444;
      --error-600: #dc2626;
      --error-700: #b91c1c;
      
      --spacing-xs: 0.25rem;
      --spacing-sm: 0.5rem;
      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      --spacing-xl: 2rem;
      --spacing-2xl: 3rem;
      
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-size-xs: 0.75rem;
      --font-size-sm: 0.875rem;
      --font-size-md: 1rem;
      --font-size-lg: 1.125rem;
      --font-size-xl: 1.25rem;
      --font-size-2xl: 1.5rem;
      --font-size-3xl: 2rem;
      
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-2xl: 1.5rem;
      
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
      
      --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Reset & Base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      line-height: 1.5;
      color: var(--neutral-900);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow-x: hidden;
    }
    
    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      overflow: hidden;
    }
    
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      animation: float 20s infinite;
    }
    
    .circle-1 {
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
      animation-delay: 0s;
    }
    
    .circle-2 {
      width: 300px;
      height: 300px;
      bottom: -50px;
      left: -50px;
      animation-delay: 5s;
    }
    
    .circle-3 {
      width: 200px;
      height: 200px;
      bottom: 30%;
      right: 20%;
      animation-delay: 10s;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(20px, -20px) scale(1.1); }
      50% { transform: translate(40px, 0) scale(1); }
      75% { transform: translate(20px, 20px) scale(0.9); }
    }
    
    /* Login Container */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      padding: var(--spacing-md);
      animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Login Card */
    .login-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: var(--radius-2xl);
      padding: var(--spacing-2xl);
      box-shadow: var(--shadow-2xl);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: transform var(--transition-base), box-shadow var(--transition-base);
    }
    
    .login-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.3);
    }
    
    /* Logo Section */
    .logo-section {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }
    
    .logo-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto var(--spacing-md);
      background: linear-gradient(135deg, var(--primary-600), var(--primary-800));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-3xl);
      color: white;
      box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5); }
      50% { box-shadow: 0 20px 30px -5px rgba(79, 70, 229, 0.8); }
    }
    
    .logo-title {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-600), var(--primary-800));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--spacing-xs);
    }
    
    .logo-subtitle {
      font-size: var(--font-size-sm);
      color: var(--neutral-500);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    /* Alert Messages */
    .alert {
      display: flex;
      align-items: flex-start;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      border-radius: var(--radius-lg);
      margin-bottom: var(--spacing-lg);
      font-size: var(--font-size-sm);
    }
    
    .alert-error {
      background: #fef2f2;
      border-left: 4px solid var(--error-500);
      color: var(--error-700);
      animation: shake 0.5s ease;
    }
    
    .alert-info {
      background: #eff6ff;
      border-left: 4px solid var(--primary-500);
      color: var(--primary-700);
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    
    .alert-icon {
      font-size: var(--font-size-lg);
      line-height: 1.4;
    }
    
    .alert-content {
      flex: 1;
    }
    
    .alert-title {
      font-weight: 600;
      margin-bottom: 2px;
    }
    
    .alert-message {
      opacity: 0.9;
    }
    
    /* Form */
    .form-group {
      margin-bottom: var(--spacing-lg);
    }
    
    .form-label {
      display: block;
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--neutral-700);
      margin-bottom: var(--spacing-xs);
      letter-spacing: 0.3px;
    }
    
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    
    .input-icon {
      position: absolute;
      left: var(--spacing-md);
      color: var(--neutral-400);
      font-size: var(--font-size-lg);
      transition: color var(--transition-base);
      z-index: 1;
      pointer-events: none;
    }
    
    .form-input {
      width: 100%;
      padding: var(--spacing-md) var(--spacing-md) var(--spacing-md) 3rem;
      font-size: var(--font-size-md);
      font-family: var(--font-family);
      color: var(--neutral-900);
      background: var(--neutral-50);
      border: 2px solid var(--neutral-200);
      border-radius: var(--radius-lg);
      transition: all var(--transition-base);
    }
    
    .form-input:hover {
      border-color: var(--neutral-300);
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary-500);
      box-shadow: 0 0 0 4px var(--primary-100);
    }
    
    .form-input:focus + .input-icon {
      color: var(--primary-600);
    }
    
    .form-input::placeholder {
      color: var(--neutral-400);
      font-size: var(--font-size-sm);
    }
    
    .form-input:disabled {
      background: var(--neutral-100);
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    /* Password Visibility Toggle */
    .password-toggle {
      position: absolute;
      right: var(--spacing-md);
      background: none;
      border: none;
      color: var(--neutral-400);
      cursor: pointer;
      font-size: var(--font-size-lg);
      padding: var(--spacing-xs);
      border-radius: var(--radius-md);
      transition: all var(--transition-base);
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .password-toggle:hover {
      color: var(--primary-600);
      background: var(--neutral-200);
    }
    
    .password-toggle:focus {
      outline: 2px solid var(--primary-500);
      outline-offset: 2px;
    }
    
    /* Form Options */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-xl);
    }
    
    .remember-me {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      cursor: pointer;
      user-select: none;
    }
    
    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-600);
      cursor: pointer;
    }
    
    .remember-me span {
      font-size: var(--font-size-sm);
      color: var(--neutral-600);
    }
    
    .forgot-link {
      font-size: var(--font-size-sm);
      color: var(--primary-600);
      text-decoration: none;
      font-weight: 500;
      transition: color var(--transition-base);
      cursor: pointer;
    }
    
    .forgot-link:hover {
      color: var(--primary-800);
      text-decoration: underline;
    }
    
    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: var(--spacing-md);
      background: linear-gradient(135deg, var(--primary-600), var(--primary-800));
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--font-size-md);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-base);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
    }
    
    .submit-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    .submit-btn:hover::before {
      width: 300px;
      height: 300px;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px var(--primary-600);
    }
    
    .submit-btn:active {
      transform: translateY(0);
    }
    
    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .submit-btn:disabled::before {
      display: none;
    }
    
    /* Loading State */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Footer */
    .login-footer {
      margin-top: var(--spacing-2xl);
      text-align: center;
    }
    
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
      flex-wrap: wrap;
    }
    
    .badge-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      font-size: var(--font-size-xs);
      color: var(--neutral-500);
    }
    
    .badge-item i {
      color: var(--success-500);
    }
    
    .version-info {
      font-size: var(--font-size-xs);
      color: var(--neutral-400);
    }
    
    .version-info span {
      color: var(--primary-600);
      font-weight: 600;
    }
    
    /* Rate Limit Warning */
    .rate-limit-warning {
      margin-top: var(--spacing-md);
      padding: var(--spacing-sm);
      background: #fffbeb;
      border-radius: var(--radius-lg);
      text-align: center;
      font-size: var(--font-size-xs);
      color: #92400e;
      display: none;
    }
    
    .rate-limit-warning i {
      margin-right: var(--spacing-xs);
      color: #f59e0b;
    }
    
    /* Attempt Counter */
    .attempt-counter {
      display: inline-block;
      padding: 2px 6px;
      border-radius: var(--radius-md);
      font-weight: 600;
      transition: all var(--transition-base);
    }
    
    /* Responsive */
    @media (max-width: 480px) {
      .login-container {
        padding: var(--spacing-sm);
      }
      
      .login-card {
        padding: var(--spacing-xl);
      }
      
      .logo-icon {
        width: 60px;
        height: 60px;
        font-size: var(--font-size-2xl);
      }
      
      .logo-title {
        font-size: var(--font-size-xl);
      }
      
      .logo-subtitle {
        font-size: var(--font-size-xs);
      }
      
      .form-options {
        flex-direction: column;
        gap: var(--spacing-sm);
        align-items: flex-start;
      }
      
      .security-badge {
        flex-direction: column;
        gap: var(--spacing-xs);
      }
      
      .circle-1 {
        width: 200px;
        height: 200px;
      }
      
      .circle-2 {
        width: 150px;
        height: 150px;
      }
      
      .circle-3 {
        width: 100px;
        height: 100px;
      }
    }
    
    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      .bg-circle,
      .login-card,
      .submit-btn::before,
      .loading-spinner,
      .logo-icon {
        animation: none;
      }
      
      .login-container {
        animation: none;
      }
    }
    
    /* Touch Device Optimizations */
    @media (hover: none) and (pointer: coarse) {
      .form-input,
      .submit-btn,
      .password-toggle {
        min-height: 48px;
      }
      
      .remember-me input[type="checkbox"] {
        width: 20px;
        height: 20px;
      }
    }
    
    /* High Contrast Mode */
    @media (prefers-contrast: high) {
      .form-input {
        border-width: 3px;
      }
      
      .alert {
        border-width: 2px;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>
    <div class="bg-circle circle-3"></div>
  </div>
  
  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="logo-section">
        <div class="logo-icon">
          <i class="fas fa-shield-halved"></i>
        </div>
        <h1 class="logo-title">Redirector Pro</h1>
        <div class="logo-subtitle">Enterprise Command Center</div>
      </div>
      
      <!-- CSRF Token (Hidden) -->
      <input type="hidden" id="csrfToken" value="">
      
      <!-- Error Alert -->
      <div class="alert alert-error" id="errorAlert" style="display: none;">
        <div class="alert-icon">
          <i class="fas fa-exclamation-circle"></i>
        </div>
        <div class="alert-content">
          <div class="alert-title">Authentication Failed</div>
          <div class="alert-message" id="errorMessage">Invalid username or password</div>
        </div>
      </div>
      
      <!-- Rate Limit Alert -->
      <div class="alert alert-info" id="rateLimitAlert" style="display: none;">
        <div class="alert-icon">
          <i class="fas fa-clock"></i>
        </div>
        <div class="alert-content">
          <div class="alert-title">Too Many Attempts</div>
          <div class="alert-message" id="rateLimitMessage">Please wait before trying again</div>
        </div>
      </div>
      
      <!-- Login Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input 
              type="text" 
              id="username" 
              name="username" 
              class="form-input" 
              placeholder="Enter your username" 
              value="admin"
              required 
              autofocus
              autocomplete="username"
              aria-label="Username"
            >
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input 
              type="password" 
              id="password" 
              name="password" 
              class="form-input" 
              placeholder="Enter your password" 
              required
              autocomplete="current-password"
              aria-label="Password"
            >
            <button 
              type="button" 
              class="password-toggle" 
              id="togglePassword"
              aria-label="Toggle password visibility"
              tabindex="-1"
            >
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>
        
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link" onclick="showHelp(event)">Need help?</a>
        </div>
        
        <button type="submit" class="submit-btn" id="loginBtn">
          <span>Sign In</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>
      
      <!-- Rate Limit Warning -->
      <div class="rate-limit-warning" id="rateLimitWarning">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="rateLimitWarningMessage"></span>
      </div>
      
      <!-- Footer -->
      <div class="login-footer">
        <div class="security-badge">
          <div class="badge-item">
            <i class="fas fa-lock"></i>
            <span>256-bit SSL</span>
          </div>
          <div class="badge-item">
            <i class="fas fa-shield"></i>
            <span>CSRF Protected</span>
          </div>
          <div class="badge-item">
            <i class="fas fa-clock"></i>
            <span>Session Timeout</span>
          </div>
        </div>
        <div class="version-info">
          <span>Redirector Pro v3.0</span> • Enterprise Edition • 
          <span class="attempt-counter" id="attemptCounter">5</span> attempts remaining
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // Configuration
    const MAX_ATTEMPTS = 5;
    const LOCKOUT_TIME = 5 * 60 * 1000; // 5 minutes
    
    // State
    let loginAttempts = 0;
    let lockoutUntil = null;
    let csrfToken = '';
    let countdownInterval = null;
    
    // DOM Elements
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    const rateLimitAlert = document.getElementById('rateLimitAlert');
    const rateLimitMessage = document.getElementById('rateLimitMessage');
    const rateLimitWarning = document.getElementById('rateLimitWarning');
    const rateLimitWarningMessage = document.getElementById('rateLimitWarningMessage');
    const attemptCounter = document.getElementById('attemptCounter');
    const togglePassword = document.getElementById('togglePassword');
    const rememberMe = document.getElementById('rememberMe');
    
    // Initialize
    document.addEventListener('DOMContentLoaded', initialize);
    
    async function initialize() {
      await fetchCsrfToken();
      loadSavedCredentials();
      startAttemptTimer();
      
      // Clear any existing session data
      if (window.performance && window.performance.navigation.type === 1) {
        console.log('Page was refreshed');
      }
    }
    
    // Fetch CSRF Token from server
    async function fetchCsrfToken() {
      try {
        const response = await fetch('/admin/login', {
          method: 'GET',
          credentials: 'include',
          headers: {
            'Accept': 'text/html',
            'Cache-Control': 'no-cache, no-store, must-revalidate',
            'Pragma': 'no-cache',
            'Expires': '0'
          }
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const html = await response.text();
        
        // Extract CSRF token using regex
        const tokenMatch = html.match(/name=["']_csrf["'] value=["']([^"']+)["']/);
        if (tokenMatch && tokenMatch[1]) {
          csrfToken = tokenMatch[1];
          document.getElementById('csrfToken').value = csrfToken;
          console.log('CSRF token loaded successfully');
        } else {
          console.error('CSRF token not found in response');
          showError('Security token not found. Please refresh the page.');
        }
      } catch (err) {
        console.error('Failed to fetch CSRF token:', err);
        showError('Unable to establish secure connection. Please check your network and refresh.');
      }
    }
    
    // Load saved credentials if "Remember me" was checked
    function loadSavedCredentials() {
      try {
        const savedUsername = localStorage.getItem('redirector_username');
        if (savedUsername) {
          usernameInput.value = savedUsername;
          rememberMe.checked = true;
        }
      } catch (err) {
        console.error('Failed to load saved credentials:', err);
      }
    }
    
    // Start attempt countdown timer
    function startAttemptTimer() {
      updateAttemptDisplay();
      
      // Check lockout status every second
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }
      
      countdownInterval = setInterval(() => {
        if (lockoutUntil) {
          const now = Date.now();
          if (now > lockoutUntil) {
            // Lockout expired
            lockoutUntil = null;
            loginAttempts = 0;
            rateLimitAlert.style.display = 'none';
            rateLimitWarning.style.display = 'none';
            enableForm();
            updateAttemptDisplay();
          } else {
            // Update countdown
            updateAttemptDisplay();
          }
        }
      }, 1000);
    }
    
    // Update attempt display
    function updateAttemptDisplay() {
      if (lockoutUntil) {
        const remaining = Math.max(0, Math.ceil((lockoutUntil - Date.now()) / 1000));
        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        
        if (minutes > 0) {
          attemptCounter.textContent = `${minutes}m ${seconds}s`;
        } else {
          attemptCounter.textContent = `${seconds}s`;
        }
        
        attemptCounter.style.color = '#ef4444';
        attemptCounter.style.background = '#fee2e2';
        attemptCounter.style.padding = '2px 8px';
      } else {
        const remaining = MAX_ATTEMPTS - loginAttempts;
        attemptCounter.textContent = remaining;
        attemptCounter.style.color = remaining <= 2 ? '#f59e0b' : '#6366f1';
        attemptCounter.style.background = 'transparent';
        attemptCounter.style.padding = '2px 0';
      }
    }
    
    // Toggle password visibility
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      const icon = togglePassword.querySelector('i');
      icon.className = type === 'password' ? 'far fa-eye' : 'far fa-eye-slash';
    });
    
    // Show error message
    function showError(message) {
      errorMessage.textContent = message;
      errorAlert.style.display = 'flex';
      
      // Auto-hide after 5 seconds
      setTimeout(() => {
        errorAlert.style.display = 'none';
      }, 5000);
    }
    
    // Show rate limit message
    function showRateLimit(message, isLocked = false) {
      if (isLocked) {
        rateLimitMessage.textContent = message;
        rateLimitAlert.style.display = 'flex';
        rateLimitWarning.style.display = 'none';
      } else {
        rateLimitWarningMessage.textContent = message;
        rateLimitWarning.style.display = 'block';
        rateLimitAlert.style.display = 'none';
      }
    }
    
    // Disable form during submission or lockout
    function disableForm(isLocked = false) {
      usernameInput.disabled = true;
      passwordInput.disabled = true;
      loginBtn.disabled = true;
      
      if (isLocked) {
        loginBtn.innerHTML = '<span class="loading-spinner"></span><span>Locked</span>';
      } else {
        loginBtn.innerHTML = '<span class="loading-spinner"></span><span>Verifying...</span>';
      }
    }
    
    // Enable form
    function enableForm() {
      usernameInput.disabled = false;
      passwordInput.disabled = false;
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<span>Sign In</span><i class="fas fa-arrow-right"></i>';
      
      // Focus password field for retry
      passwordInput.focus();
    }
    
    // Show help dialog
    function showHelp(event) {
      event.preventDefault();
      alert(
        '🔐 Admin Access Help\n\n' +
        '• Default username: admin\n' +
        '• Password was set during installation\n' +
        '• Check your .env file for ADMIN_PASSWORD_HASH\n' +
        '• Contact your system administrator for assistance'
      );
    }
    
    // Handle form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Check if locked out
      if (lockoutUntil && Date.now() < lockoutUntil) {
        const remaining = Math.ceil((lockoutUntil - Date.now()) / 1000);
        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        const timeString = minutes > 0 ? `${minutes} minute${minutes > 1 ? 's' : ''}` : `${seconds} second${seconds > 1 ? 's' : ''}`;
        
        showRateLimit(`Too many failed attempts. Please wait ${timeString}.`, true);
        return;
      }
      
      // Validate inputs
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (!username) {
        showError('Please enter your username');
        usernameInput.focus();
        return;
      }
      
      if (!password) {
        showError('Please enter your password');
        passwordInput.focus();
        return;
      }
      
      // Check CSRF token
      if (!csrfToken) {
        showError('Security token missing. Refreshing...');
        await fetchCsrfToken();
        return;
      }
      
      // Disable form during submission
      disableForm();
      
      try {
        console.log('Attempting login for user:', username);
        
        const response = await fetch('/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfToken,
            'X-Requested-With': 'XMLHttpRequest',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            username: username,
            password: password,
            _csrf: csrfToken,
            remember: rememberMe.checked
          }),
          credentials: 'include'
        });
        
        // Parse response
        let data;
        const contentType = response.headers.get('content-type');
        if (contentType && contentType.includes('application/json')) {
          data = await response.json();
        } else {
          const text = await response.text();
          console.error('Non-JSON response:', text.substring(0, 200));
          throw new Error('Invalid server response format');
        }
        
        if (response.ok && data.success) {
          // Successful login
          console.log('Login successful, redirecting...');
          
          // Save username if "Remember me" is checked
          try {
            if (rememberMe.checked) {
              localStorage.setItem('redirector_username', username);
            } else {
              localStorage.removeItem('redirector_username');
            }
          } catch (err) {
            console.error('Failed to save username:', err);
          }
          
          // Redirect to admin dashboard
          window.location.href = '/admin';
        } else {
          // Failed login
          loginAttempts++;
          console.log(`Login failed. Attempt ${loginAttempts}/${MAX_ATTEMPTS}`);
          
          updateAttemptDisplay();
          
          if (loginAttempts >= MAX_ATTEMPTS) {
            // Lock out
            lockoutUntil = Date.now() + LOCKOUT_TIME;
            showRateLimit(`Account locked for 5 minutes due to too many failed attempts.`, true);
            disableForm(true);
            
            // Log the lockout
            console.warn(`Account locked for IP until ${new Date(lockoutUntil).toISOString()}`);
          } else {
            // Show error
            const remaining = MAX_ATTEMPTS - loginAttempts;
            showError(data.error || 'Invalid username or password');
            
            // Show rate limit warning
            if (remaining <= 2) {
              showRateLimit(`${remaining} attempt${remaining > 1 ? 's' : ''} remaining before lockout`, false);
            }
            
            // Re-enable form for retry
            enableForm();
            
            // Shake animation
            loginForm.style.animation = 'none';
            loginForm.offsetHeight; // Trigger reflow
            loginForm.style.animation = 'shake 0.5s ease';
            
            // Clear password field
            passwordInput.value = '';
          }
        }
      } catch (err) {
        console.error('Login error:', err);
        showError('Connection error. Please check your network and try again.');
        enableForm();
      }
    });
    
    // Input validation and error clearing
    usernameInput.addEventListener('input', () => {
      errorAlert.style.display = 'none';
      rateLimitWarning.style.display = 'none';
    });
    
    passwordInput.addEventListener('input', () => {
      errorAlert.style.display = 'none';
      rateLimitWarning.style.display = 'none';
    });
    
    usernameInput.addEventListener('invalid', (e) => {
      e.preventDefault();
      showError('Please enter your username');
    });
    
    passwordInput.addEventListener('invalid', (e) => {
      e.preventDefault();
      showError('Please enter your password');
    });
    
    // Handle Enter key
    loginForm.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !loginBtn.disabled) {
        e.preventDefault();
        loginForm.dispatchEvent(new Event('submit'));
      }
    });
    
    // Handle back/forward cache
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) {
        // Page was loaded from bfcache (back/forward cache)
        window.location.reload();
      }
    });
    
    // Prevent form resubmission on refresh
    if (window.history.replaceState) {
      window.history.replaceState(null, null, window.location.href);
    }
    
    // Clean up on unload
    window.addEventListener('beforeunload', () => {
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }
    });
  </script>
</body>
</html>
