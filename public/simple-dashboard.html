<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirector Pro - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 16px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            color: #667eea;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .header-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .header-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
        }
        
        .header-stat i {
            color: #667eea;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .card h2 i {
            color: #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #fee;
            color: #e53e3e;
        }
        
        .btn-danger:hover {
            background: #fdd;
        }
        
        .mode-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .mode-selector label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin: 0;
            font-weight: normal;
        }
        
        .mode-selector input[type="radio"] {
            width: auto;
            margin: 0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 20px;
            color: white;
            text-align: center;
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .result-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
            border-left: 4px solid #48bb78;
        }
        
        .result-card.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .result-url {
            background: white;
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
            margin: 15px 0;
            border: 1px solid #e0e0e0;
        }
        
        .result-url a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .result-url a:hover {
            text-decoration: underline;
        }
        
        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .detail-item {
            text-align: center;
        }
        
        .detail-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .detail-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .alert-success {
            background: #48bb78;
        }
        
        .alert-error {
            background: #e53e3e;
        }
        
        .alert-info {
            background: #4299e1;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
                justify-content: center;
            }
            
            .mode-selector {
                flex-direction: column;
                gap: 10px;
            }
            
            .result-details {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-link"></i>
                Redirector Pro
            </h1>
            <p>Enterprise-grade URL redirector with advanced security features</p>
            <div class="header-stats">
                <div class="header-stat">
                    <i class="fas fa-chart-line"></i>
                    <span id="headerTotalRequests">0 requests</span>
                </div>
                <div class="header-stat">
                    <i class="fas fa-clock"></i>
                    <span id="headerUptime">0s uptime</span>
                </div>
                <div class="header-stat">
                    <i class="fas fa-robot"></i>
                    <span id="headerBotBlocks">0 blocks</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>
                <i class="fas fa-plus-circle"></i>
                Generate New Link
            </h2>
            
            <div class="form-group">
                <label>Target URL *</label>
                <input type="url" id="targetUrl" placeholder="https://example.com" value="https://www.google.com">
            </div>
            
            <div class="form-group">
                <label>Password Protection (Optional)</label>
                <input type="password" id="linkPassword" placeholder="Enter password to protect the link">
            </div>
            
            <div class="form-group">
                <label>Notes (Optional)</label>
                <textarea id="linkNotes" placeholder="Add notes about this link..."></textarea>
            </div>
            
            <div class="mode-selector">
                <label>
                    <input type="radio" name="linkMode" value="short" checked>
                    <i class="fas fa-link"></i> Short Link
                </label>
                <label>
                    <input type="radio" name="linkMode" value="long">
                    <i class="fas fa-code-branch"></i> Long Link
                </label>
                <label>
                    <input type="radio" name="linkMode" value="auto">
                    <i class="fas fa-magic"></i> Auto
                </label>
            </div>
            
            <div class="form-group">
                <label>Expires In</label>
                <select id="expiresIn">
                    <option value="5m">5 minutes</option>
                    <option value="30m" selected>30 minutes</option>
                    <option value="1h">1 hour</option>
                    <option value="6h">6 hours</option>
                    <option value="24h">24 hours</option>
                    <option value="7d">7 days</option>
                    <option value="30d">30 days</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Max Clicks (Optional)</label>
                <input type="number" id="maxClicks" placeholder="Unlimited" min="1">
            </div>
            
            <div class="btn-group">
                <button class="btn-primary" id="generateBtn">
                    <i class="fas fa-magic"></i> Generate Link
                </button>
                <button class="btn-secondary" id="clearBtn">
                    <i class="fas fa-eraser"></i> Clear Form
                </button>
            </div>
            
            <div id="result" class="result-card">
                <div id="resultContent"></div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalRequests">0</div>
                <div class="stat-label">Total Requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeLinks">0</div>
                <div class="stat-label">Active Links</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="botBlocks">0</div>
                <div class="stat-label">Bot Blocks</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="uptime">0</div>
                <div class="stat-label">Uptime (seconds)</div>
            </div>
        </div>

        <div class="card">
            <h2>
                <i class="fas fa-bolt"></i>
                Quick Actions
            </h2>
            <div class="btn-group">
                <button class="btn-secondary" id="refreshStatsBtn">
                    <i class="fas fa-sync-alt"></i> Refresh Stats
                </button>
                <button class="btn-secondary" id="clearCacheBtn">
                    <i class="fas fa-trash-alt"></i> Clear Cache
                </button>
                <button class="btn-danger" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <div class="card">
            <h2>
                <i class="fas fa-history"></i>
                Recent Links
            </h2>
            <div class="table-container">
                <table id="linksTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Mode</th>
                            <th>Target URL</th>
                            <th>Expires</th>
                            <th>Clicks</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody">
                        <tr>
                            <td colspan="6" style="text-align: center;">Loading links...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script>
        // ============================================
        // Helper Functions
        // ============================================
        function showAlert(message, type = 'info') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function formatDuration(seconds) {
            if (!seconds) return '0s';
            if (seconds < 60) return Math.floor(seconds) + 's';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h';
            return Math.floor(seconds / 86400) + 'd';
        }
        
        // ============================================
        // API Calls
        // ============================================
        async function generateLink() {
            const url = document.getElementById('targetUrl').value;
            const password = document.getElementById('linkPassword').value;
            const notes = document.getElementById('linkNotes').value;
            const linkMode = document.querySelector('input[name="linkMode"]:checked').value;
            const expiresIn = document.getElementById('expiresIn').value;
            const maxClicks = document.getElementById('maxClicks').value;
            
            if (!url) {
                showAlert('Please enter a URL', 'error');
                return;
            }
            
            const generateBtn = document.getElementById('generateBtn');
            const originalText = generateBtn.innerHTML;
            generateBtn.innerHTML = '<span class="loading"></span> Generating...';
            generateBtn.disabled = true;
            
            try {
                const response = await fetch('/api/v1/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url,
                        password: password || undefined,
                        notes: notes || undefined,
                        linkMode,
                        expiresIn,
                        maxClicks: maxClicks ? parseInt(maxClicks) : undefined
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    const resultDiv = document.getElementById('result');
                    const resultContent = document.getElementById('resultContent');
                    
                    resultContent.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <strong style="color: #48bb78;">
                                <i class="fas fa-check-circle"></i> Link Generated Successfully!
                            </strong>
                            <span style="background: #667eea; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px;">
                                ${data.mode.toUpperCase()}
                            </span>
                        </div>
                        <div class="result-url">
                            <i class="fas fa-link"></i> 
                            <a href="${data.url}" target="_blank">${data.url}</a>
                            <button onclick="copyToClipboard('${data.url}')" style="margin-left: 10px; padding: 5px 10px; font-size: 12px;">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                        </div>
                        <div class="result-details">
                            <div class="detail-item">
                                <div class="detail-label">ID</div>
                                <div class="detail-value"><code>${data.id ? data.id.substring(0, 16) + '...' : 'N/A'}</code></div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Expires</div>
                                <div class="detail-value">${data.expires_human || '30 minutes'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Length</div>
                                <div class="detail-value">${data.linkLength || 0} chars</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Protected</div>
                                <div class="detail-value">${data.passwordProtected ? 'Yes' : 'No'}</div>
                            </div>
                        </div>
                    `;
                    resultDiv.classList.add('show');
                    
                    showAlert('Link generated successfully!', 'success');
                    refreshStats();
                    loadRecentLinks();
                } else {
                    showAlert(data.error || 'Failed to generate link', 'error');
                }
            } catch (err) {
                showAlert('Network error: ' + err.message, 'error');
            } finally {
                generateBtn.innerHTML = originalText;
                generateBtn.disabled = false;
            }
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showAlert('Copied to clipboard!', 'success');
        }
        
        async function refreshStats() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                
                document.getElementById('totalRequests').textContent = formatNumber(data.stats?.totalRequests || 0);
                document.getElementById('activeLinks').textContent = formatNumber(data.stats?.activeLinks || 0);
                document.getElementById('botBlocks').textContent = formatNumber(data.stats?.botBlocks || 0);
                document.getElementById('uptime').textContent = formatDuration(data.uptime);
                
                document.getElementById('headerTotalRequests').textContent = formatNumber(data.stats?.totalRequests || 0) + ' requests';
                document.getElementById('headerUptime').textContent = formatDuration(data.uptime) + ' uptime';
                document.getElementById('headerBotBlocks').textContent = formatNumber(data.stats?.botBlocks || 0) + ' blocks';
            } catch (err) {
                console.error('Failed to refresh stats:', err);
            }
        }
        
        async function loadRecentLinks() {
            try {
                const response = await fetch('/api/links?limit=10');
                if (response.ok) {
                    const links = await response.json();
                    const tbody = document.getElementById('linksTableBody');
                    
                    if (!links || links.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No links found</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = links.map(link => `
                        <tr>
                            <td><code>${link.id ? link.id.substring(0, 12) + '...' : 'N/A'}</code></td>
                            <td><span style="background: ${link.link_mode === 'long' ? '#f59e0b' : '#667eea'}; color: white; padding: 4px 8px; border-radius: 20px; font-size: 11px;">${link.link_mode || 'short'}</span></td>
                            <td><a href="${link.target_url}" target="_blank" style="color: #667eea; text-decoration: none;">${link.target_url ? link.target_url.substring(0, 50) : 'N/A'}${link.target_url && link.target_url.length > 50 ? '...' : ''}</a></td>
                            <td>${link.expires_at ? new Date(link.expires_at).toLocaleString() : 'Never'}</td>
                            <td>${link.current_clicks || 0}</td>
                            <td>
                                <button onclick="copyLink('${link.id}')" style="padding: 5px 10px; font-size: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">
                                    <i class="fas fa-copy"></i> Copy
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('Failed to load links:', err);
            }
        }
        
        async function copyLink(linkId) {
            const url = window.location.origin + '/v/' + linkId;
            await copyToClipboard(url);
        }
        
        async function clearCache() {
            try {
                const response = await fetch('/admin/clear-cache', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    showAlert('Cache cleared successfully!', 'success');
                    refreshStats();
                } else {
                    showAlert('Failed to clear cache', 'error');
                }
            } catch (err) {
                showAlert('Network error', 'error');
            }
        }
        
        async function logout() {
            try {
                await fetch('/admin/logout', { method: 'POST' });
                window.location.href = '/admin/login';
            } catch (err) {
                console.error('Logout failed:', err);
                window.location.href = '/admin/login';
            }
        }
        
        function clearForm() {
            document.getElementById('targetUrl').value = 'https://www.google.com';
            document.getElementById('linkPassword').value = '';
            document.getElementById('linkNotes').value = '';
            document.getElementById('expiresIn').value = '30m';
            document.getElementById('maxClicks').value = '';
            document.getElementById('result').classList.remove('show');
            
            document.querySelector('input[value="short"]').checked = true;
            
            showAlert('Form cleared', 'info');
        }
        
        // ============================================
        // Event Listeners
        // ============================================
        document.getElementById('generateBtn').addEventListener('click', generateLink);
        document.getElementById('clearBtn').addEventListener('click', clearForm);
        document.getElementById('refreshStatsBtn').addEventListener('click', refreshStats);
        document.getElementById('clearCacheBtn').addEventListener('click', clearCache);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        
        document.getElementById('targetUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateLink();
            }
        });
        
        refreshStats();
        loadRecentLinks();
        
        setInterval(refreshStats, 10000);
        setInterval(loadRecentLinks, 30000);
    </script>
</body>
</html>
